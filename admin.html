<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMI Frota | Painel Administrativo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <style>
    .container   { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .logout-btn  {
      background: transparent; border: 1px solid #FFD43B; color: #FFD43B;
      padding: 8px 16px; border-radius: 8px; cursor: pointer;
      font-size: 13px; transition: background .2s;
    }
    .logout-btn:hover { background: rgba(255,212,59,.1); }

    /* Stats */
    .stats-grid  { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card   { background: #FFFFFF; border-radius: 16px; padding: 20px; border: 1px solid #EAEAE2; }
    .stat-value  { font-size: 32px; font-weight: 700; color: #FFD43B; }
    .stat-label  { font-size: 13px; color: #6B6B65; margin-top: 5px; }

    /* Filtros */
    .filters-section  {
      background: #FFFFFF; border-radius: 16px;
      padding: 20px; margin-bottom: 20px; border: 1px solid #EAEAE2;
    }
    .filters-title    { font-weight: 600; margin-bottom: 15px; color: #1A1A18; display: flex; align-items: center; gap: 8px; }
    .filter-row       { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
    .filter-group     { display: flex; flex-direction: column; gap: 5px; }
    .filter-group label { font-size: 11px; font-weight: 600; color: #4A4A45; text-transform: uppercase; }
    .filter-group input,
    .filter-group select { padding: 10px 14px; border: 1px solid #D4D4CC; border-radius: 8px; font-size: 13px; min-width: 150px; font-family: 'Inter', sans-serif; }
    .btn-filter  { padding: 10px 20px; background: #FFD43B; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; font-family: 'Inter', sans-serif; }
    .btn-clear   { padding: 10px 20px; background: #EAEAE2; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; font-family: 'Inter', sans-serif; }
    .filter-badge { background: rgba(255,212,59,.12); padding: 4px 10px; border-radius: 20px; font-size: 11px; color: #B8860B; }

    /* Action bar */
    .action-bar  { display: flex; justify-content: flex-end; margin-bottom: 20px; }
    .btn-excel   { padding: 10px 20px; background: #1A7D3C; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; font-family: 'Inter', sans-serif; }
    .btn-excel:hover { background: #0F5E2D; }

    /* Tabela */
    .table-container { background: #FFFFFF; border-radius: 16px; border: 1px solid #EAEAE2; overflow-x: auto; }
    table            { width: 100%; border-collapse: collapse; }
    th, td           { padding: 14px 16px; text-align: left; border-bottom: 1px solid #EAEAE2; }
    th               { background: #FAFAF8; font-weight: 600; font-size: 12px; color: #4A4A45; text-transform: uppercase; }
    td               { font-size: 13px; }
    tbody tr:hover   { background: #FAFAF8; }
    .btn-ver, .btn-responder {
      background: #EAEAE2; border: none; padding: 6px 12px;
      border-radius: 6px; font-size: 12px; cursor: pointer; transition: all .2s; margin-right: 4px;
      font-family: 'Inter', sans-serif;
    }
    .btn-responder { background: #FFD43B; color: #1A1A18; }
    .btn-ver:hover,
    .btn-responder:hover { transform: translateY(-1px); }

    /* Modais */
    .modal {
      display: none; position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.5); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-content {
      background: #FFFFFF; border-radius: 20px;
      max-width: 700px; width: 90%; max-height: 85vh; overflow-y: auto;
      animation: modalIn .25s ease;
    }
    @keyframes modalIn { from { opacity:0; transform:scale(.95); } to { opacity:1; transform:scale(1); } }
    .modal-header {
      padding: 20px 24px;
      background: linear-gradient(135deg, #FFD43B, #FFC107);
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; border-radius: 20px 20px 0 0;
    }
    .modal-header h3 { color: #1A1A18; font-size: 18px; }
    .close-modal     { background: none; border: none; font-size: 28px; cursor: pointer; color: #1A1A18; opacity: .7; }
    .close-modal:hover { opacity: 1; }
    .modal-body      { padding: 24px; }
    .modal-footer    {
      padding: 16px 24px; border-top: 1px solid #EAEAE2;
      display: flex; gap: 12px; justify-content: flex-end;
      background: #FAFAF8; border-radius: 0 0 20px 20px;
      position: sticky; bottom: 0;
    }

    /* Detalhes do modal */
    .detail-section  { margin-bottom: 20px; padding: 16px; background: #FAFAF8; border-radius: 12px; border: 1px solid #EAEAE2; }
    .detail-title    { font-weight: 600; color: #B8860B; font-size: 14px; margin-bottom: 12px; border-bottom: 1px solid #EAEAE2; padding-bottom: 6px; }
    .detail-grid     { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
    .detail-item     { display: flex; flex-direction: column; }
    .detail-label    { font-size: 11px; color: #8B8B85; text-transform: uppercase; margin-bottom: 4px; }
    .detail-value    { font-size: 14px; font-weight: 500; color: #1A1A18; }
    .descricao-box   { background: #FFFFFF; padding: 12px; border-radius: 8px; border: 1px solid #EAEAE2; line-height: 1.5; font-size: 13px; }
    .response-item   { padding: 10px; border-bottom: 1px solid #EAEAE2; }
    .response-item:last-child { border-bottom: none; }
    .response-history { background: #FAFAF8; border-radius: 10px; padding: 12px; margin-top: 16px; }

    /* Form dentro do modal */
    .modal-body .form-group { margin-bottom: 20px; }
    .modal-body label       { display: block; font-size: 12px; font-weight: 600; color: #4A4A45; margin-bottom: 6px; text-transform: uppercase; }
    .modal-body input, .modal-body textarea, .modal-body select {
      width: 100%; padding: 12px; border: 1px solid #D4D4CC;
      border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 14px;
    }
    .modal-body textarea { resize: vertical; min-height: 100px; }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="logo-area">
      <div class="logo-icon"><i class="fas fa-bus"></i></div>
      <div><strong>CMI FROTA</strong> | Painel Administrativo</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <span style="font-size:13px"><i class="fas fa-user"></i> {{ admin.nome }}</span>
      <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
    </div>
  </div>

  <div class="container">

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="totalCount">0</div>
        <div class="stat-label">Total de Ocorrências</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="pendingCount">0</div>
        <div class="stat-label">Aguardando Resposta</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="answeredCount">0</div>
        <div class="stat-label">Respondidas</div>
      </div>
    </div>

    <!-- Filtros -->
    <div class="filters-section">
      <div class="filters-title">
        <i class="fas fa-filter"></i> Filtros
        <span id="filtroAtivoBadge" class="filter-badge" style="display:none"></span>
      </div>
      <div class="filter-row">
        <div class="filter-group">
          <label><i class="fas fa-hashtag"></i> Protocolo</label>
          <input type="text" id="filterProtocolo" placeholder="CMI-...">
        </div>
        <div class="filter-group">
          <label><i class="fas fa-tag"></i> Status</label>
          <select id="filterStatus">
            <option value="">Todos</option>
            <option value="Aguardando resposta">Aguardando resposta</option>
            <option value="Respondida">Respondida</option>
          </select>
        </div>
        <div class="filter-group">
          <label><i class="fas fa-calendar-alt"></i> Data Início</label>
          <input type="date" id="filterDataInicio">
        </div>
        <div class="filter-group">
          <label><i class="fas fa-calendar-alt"></i> Data Fim</label>
          <input type="date" id="filterDataFim">
        </div>
        <div class="filter-group">
          <button class="btn-filter" onclick="aplicarFiltros()"><i class="fas fa-search"></i> Filtrar</button>
        </div>
        <div class="filter-group">
          <button class="btn-clear" onclick="limparFiltros()"><i class="fas fa-times"></i> Limpar</button>
        </div>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn-excel" onclick="abrirModalExport()">
        <i class="fas fa-file-excel"></i> Exportar para Excel
      </button>
    </div>

    <!-- Tabela -->
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Protocolo</th><th>Data</th><th>Empresa</th><th>Operador</th>
            <th>Veículo</th><th>Classificação</th><th>Status</th><th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaOcorrencias">
          <tr><td colspan="8" style="text-align:center;padding:40px;color:#8B8B85">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal: Exportar -->
  <div id="modalExport" class="modal">
    <div class="modal-content" style="max-width:450px">
      <div class="modal-header">
        <h3><i class="fas fa-file-excel"></i> Exportar CSV</h3>
        <button class="close-modal" onclick="fecharModalExport()">&times;</button>
      </div>
      <div class="modal-body">
        <p style="margin-bottom:20px;color:#6B6B65;font-size:14px">Selecione o período para exportar:</p>
        <div class="form-group">
          <label>Data Início</label>
          <input type="date" id="exportDataInicio">
        </div>
        <div class="form-group">
          <label>Data Fim</label>
          <input type="date" id="exportDataFim">
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:8px">
          <input type="checkbox" id="exportTodas" style="width:auto" onchange="toggleExportDates()">
          <label style="text-transform:none;font-size:13px;margin:0">Exportar todas (ignorar período)</label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ver" onclick="fecharModalExport()">Cancelar</button>
        <button class="btn-responder" onclick="exportarExcel()">Exportar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Visualizar -->
  <div id="modalVisualizar" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3><i class="fas fa-eye"></i> Detalhes da Ocorrência</h3>
        <button class="close-modal" onclick="fecharModalVisualizar()">&times;</button>
      </div>
      <div class="modal-body" id="visualizarBody"></div>
      <div class="modal-footer">
        <button class="btn-ver"       onclick="fecharModalVisualizar()">Fechar</button>
        <button class="btn-responder" onclick="responderDaVisualizacao()">
          <i class="fas fa-reply"></i> Responder
        </button>
      </div>
    </div>
  </div>

  <!-- Modal: Responder -->
  <div id="modalResposta" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3><i class="fas fa-reply"></i> Responder Ocorrência</h3>
        <button class="close-modal" onclick="fecharModalResposta()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Protocolo</label>
          <input type="text" id="modalProtocolo" readonly style="background:#FAFAF8;font-family:monospace">
        </div>
        <div class="form-group">
          <label>Resumo da Ocorrência</label>
          <div id="modalDetalhes" style="background:#FAFAF8;padding:12px;border-radius:8px;font-size:13px;line-height:1.5"></div>
        </div>
        <div class="form-group">
          <label>Resposta <span style="color:#E54D2E">*</span></label>
          <textarea id="respostaTexto" placeholder="Digite sua resposta..."></textarea>
        </div>
        <div class="form-group">
          <label>Status após resposta</label>
          <select id="statusResposta">
            <option value="Respondida">Respondida (Concluído)</option>
            <option value="Aguardando resposta">Aguardando resposta</option>
          </select>
        </div>
        <div id="respostasAnteriores" class="response-history" style="display:none"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-ver"       onclick="fecharModalResposta()">Cancelar</button>
        <button class="btn-responder" onclick="enviarResposta()">
          <i class="fas fa-paper-plane"></i> Enviar Resposta
        </button>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>
</html>
